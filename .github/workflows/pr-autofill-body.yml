name: PR Autofill Body

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  autofill:
    runs-on: ubuntu-latest
    steps:
      - name: Autofill empty PR template sections
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = pr.number;

            const body = pr.body || '';

            const emptySection = (sectionTitle) => {
              const pattern = new RegExp(
                `##\\s+${sectionTitle}[\\s\\S]*?(?=\\n##\\s+|$)`,
                'i'
              );
              const match = body.match(pattern);
              if (!match) return true;
              const content = match[0]
                .replace(new RegExp(`##\\s+${sectionTitle}`, 'i'), '')
                .trim();
              if (!content) return true;

              // Consider these as "empty placeholders"
              return /^-\s*$/.test(content) || /^1\.\s*$/.test(content);
            };

            const shouldFill =
              body.trim() === '' ||
              emptySection('Summary') ||
              emptySection('Why') ||
              emptySection('Changes') ||
              emptySection('How To Test');

            if (!shouldFill) {
              core.info('PR body already filled. Skip.');
              return;
            }

            const filesResp = await github.rest.pulls.listFiles({
              owner,
              repo,
              pull_number,
              per_page: 100
            });

            const files = filesResp.data;
            const changedFiles = files.map((f) => `- \`${f.filename}\` (${f.status})`);
            const topChanges = changedFiles.slice(0, 12);
            const moreCount = changedFiles.length - topChanges.length;

            const summaryLine = `- ${pr.title}`;
            const whyLine = `- 브랜치 \`${pr.head.ref}\` 작업 내용을 \`${pr.base.ref}\`에 반영`;

            const changesSection =
              topChanges.length > 0
                ? `${topChanges.join('\n')}${moreCount > 0 ? `\n- ...and ${moreCount} more files` : ''}`
                : '- 변경 파일 없음';

            const newBody = [
              '## Summary',
              summaryLine,
              '',
              '## Why',
              whyLine,
              '',
              '## Changes',
              changesSection,
              '',
              '## How To Test',
              '1. `npm run lint`',
              '2. `npm run typecheck`',
              '3. `npm run build`',
              '4. 로컬에서 변경된 화면/동작 확인',
              '',
              '## Checklist',
              '- [ ] lint 통과 (`npm run lint`)',
              '- [ ] typecheck 통과 (`npm run typecheck`)',
              '- [ ] build 통과 (`npm run build`)',
              '- [ ] UI 변경 시 스크린샷 첨부',
              ''
            ].join('\n');

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number,
              body: newBody
            });

            core.info('PR body autofilled.');
